version: '3.8'

services:
  grouping-tool:
    build: .
    ports:
      - "20425:20425"
    volumes:
      - ./group_tool.db:/app/group_tool.db  # Persist the database
      - ./results:/grouping  # Mount local results directory to container's /grouping directory
    environment:
      - FLASK_ENV=production
    restart: unless-stopped