name: 🐳 Auto-build Grouping Tool on Code Change

on:
  push:
    branches: [ main ]  # 或你使用的主分支名，如 master
    paths:
      - 'experiment/grouping_tool/**'  # 注意：你目录是 grouping_tools（带 s）

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧱 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./experiment/grouping_tool
          file: ./experiment/grouping_tool/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/bioscience-grouping-tool:latest
            ghcr.io/${{ github.repository_owner }}/bioscience-grouping-tool:${{ github.sha }}