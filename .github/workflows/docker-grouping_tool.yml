name: 🐳 Build & Push Grouping Tool to GHCR

on:
  # 方式1: 推送特定 tag（推荐）
  push:
    tags:
      - 'v*'

  # 方式2: 手动触发（方便测试）
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bioscience-grouping
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ github.ref_name }}

      - name: 🧱 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./experiment/grouping_tools
          file: ./experiment/grouping_tools/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max